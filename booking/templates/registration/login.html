{% extends "booking/base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
  <p class="eyebrow">Welcome Back</p>
  <h1>Login</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
